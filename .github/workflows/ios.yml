name: iOS Build and Test

on:
  push:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"
  pull_request:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    env:
      PROJECT: ModelQuantizer.xcodeproj
      SCHEME: ModelQuantizer
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Build Settings
      run: xcodebuild -project "$PROJECT" -scheme "$SCHEME" -showBuildSettings
    
    - name: Build
      run: |
          xcodebuild clean build \
          -project "$PROJECT" \
          -scheme "$SCHEME" \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Resolve test destination (optional)
      id: test_destination
      shell: bash
      run: |
        set -euo pipefail
        DESTINATION="$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" -showdestinations 2>/dev/null | ruby -e 'line = STDIN.each_line.find { |l| l.include?("platform:iOS Simulator") && l.include?("id:") }; if line && (m = line.match(/id:([A-F0-9-]+)/)); puts m[1]; end')"
        if [ -n "$DESTINATION" ]; then
          echo "destination=id=$DESTINATION" >> "$GITHUB_OUTPUT"
          echo "can_test=true" >> "$GITHUB_OUTPUT"
        else
          echo "destination=generic/platform=iOS Simulator" >> "$GITHUB_OUTPUT"
          echo "can_test=false" >> "$GITHUB_OUTPUT"
          echo "No concrete iOS Simulator destination found. Test step will be skipped."
        fi

    - name: Run Tests
      run: |
        if [ "${{ steps.test_destination.outputs.can_test }}" != "true" ]; then
          echo "Skipping tests: no concrete simulator destination available on this runner."
        elif xcodebuild -project "$PROJECT" -list | grep -q "Tests"; then
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "${{ steps.test_destination.outputs.destination }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "No test target found; skipping test step."
        fi
    
    - name: Archive Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/Library/Developer/Xcode/DerivedData/*/Logs/
        retention-days: 7

  analyze:
    name: Static Analysis
    runs-on: macos-14
    env:
      PROJECT: ModelQuantizer.xcodeproj
      SCHEME: ModelQuantizer
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Run Static Analysis
      run: |
        xcodebuild analyze \
          -project "$PROJECT" \
          -scheme "$SCHEME" \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CLANG_ANALYZER_OUTPUT=plist-html \
          CLANG_ANALYZER_OUTPUT_DIR=analyzer-results
    
    - name: Upload Analysis Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analyzer-results
        path: analyzer-results/
        retention-days: 7
