name: iOS Build and Test

on:
  push:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"
  pull_request:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Show Xcode Version
      run: xcodebuild -version
    
    - name: Show Build Settings
      run: xcodebuild -project ModelQuantizer.xcodeproj -scheme ModelQuantizer -showBuildSettings
    
    - name: Build
      run: |
        xcodebuild clean build \
          -project ModelQuantizer.xcodeproj \
          -scheme ModelQuantizer \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Run Tests
      run: |
        if xcodebuild -project ModelQuantizer.xcodeproj -list | grep -q "Tests"; then
          xcodebuild test \
            -project ModelQuantizer.xcodeproj \
            -scheme ModelQuantizer \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "No test target found; skipping test step."
        fi
    
    - name: Archive Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/Library/Developer/Xcode/DerivedData/*/Logs/
        retention-days: 7

  analyze:
    name: Static Analysis
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Run Static Analysis
      run: |
        xcodebuild analyze \
          -project ModelQuantizer.xcodeproj \
          -scheme ModelQuantizer \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CLANG_ANALYZER_OUTPUT=plist-html \
          CLANG_ANALYZER_OUTPUT_DIR=analyzer-results
    
    - name: Upload Analysis Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analyzer-results
        path: analyzer-results/
        retention-days: 7
