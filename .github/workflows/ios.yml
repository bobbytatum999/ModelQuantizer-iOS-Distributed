name: iOS Build and Test

on:
  push:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"
  pull_request:
    branches: [ "**" ]
    paths:
      - ".github/workflows/**"
      - "ModelQuantizer/**"
      - "ModelQuantizer.xcodeproj/**"
      - "README.md"
      - "TRIGGER.md"

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    env:
      PROJECT: ModelQuantizer.xcodeproj
      SCHEME: ModelQuantizer
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Resolve available simulator
      id: simulator
      shell: bash
      run: |
        set -euo pipefail
        RUNTIME_ID="$(xcrun simctl list runtimes available -j | ruby -rjson -e 'data = JSON.parse(STDIN.read); ios = data.fetch("runtimes", []).find { |r| r["isAvailable"] && r["identifier"].to_s.include?("iOS") }; abort("No available iOS Simulator runtime found") unless ios; puts ios["identifier"]')"
        DEVICE_UDID="$(xcrun simctl list devices available -j "$RUNTIME_ID" | ruby -rjson -e 'data = JSON.parse(STDIN.read); devices = data.fetch("devices", {}).values.flatten; preferred = devices.find { |d| d["name"] == "iPhone 15" } || devices.first; abort("No available iOS Simulator devices found") unless preferred; puts preferred["udid"]')"
        echo "runtime_id=$RUNTIME_ID" >> "$GITHUB_OUTPUT"
        echo "device_udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"
        xcrun simctl boot "$DEVICE_UDID" || true
        xcrun simctl bootstatus "$DEVICE_UDID" -b
    
    - name: Show Build Settings
      run: xcodebuild -project "$PROJECT" -scheme "$SCHEME" -showBuildSettings
    
    - name: Build
      run: |
        xcodebuild clean build \
          -project "$PROJECT" \
          -scheme "$SCHEME" \
          -destination "id=${{ steps.simulator.outputs.device_udid }}" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Run Tests
      run: |
        if xcodebuild -project "$PROJECT" -list | grep -q "Tests"; then
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.simulator.outputs.device_udid }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "No test target found; skipping test step."
        fi
    
    - name: Archive Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/Library/Developer/Xcode/DerivedData/*/Logs/
        retention-days: 7

  analyze:
    name: Static Analysis
    runs-on: macos-14
    env:
      PROJECT: ModelQuantizer.xcodeproj
      SCHEME: ModelQuantizer
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Resolve available simulator
      id: simulator
      shell: bash
      run: |
        set -euo pipefail
        RUNTIME_ID="$(xcrun simctl list runtimes available -j | ruby -rjson -e 'data = JSON.parse(STDIN.read); ios = data.fetch("runtimes", []).find { |r| r["isAvailable"] && r["identifier"].to_s.include?("iOS") }; abort("No available iOS Simulator runtime found") unless ios; puts ios["identifier"]')"
        DEVICE_UDID="$(xcrun simctl list devices available -j "$RUNTIME_ID" | ruby -rjson -e 'data = JSON.parse(STDIN.read); devices = data.fetch("devices", {}).values.flatten; preferred = devices.find { |d| d["name"] == "iPhone 15" } || devices.first; abort("No available iOS Simulator devices found") unless preferred; puts preferred["udid"]')"
        echo "runtime_id=$RUNTIME_ID" >> "$GITHUB_OUTPUT"
        echo "device_udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"
        xcrun simctl boot "$DEVICE_UDID" || true
        xcrun simctl bootstatus "$DEVICE_UDID" -b
    
    - name: Run Static Analysis
      run: |
        xcodebuild analyze \
          -project "$PROJECT" \
          -scheme "$SCHEME" \
          -destination "id=${{ steps.simulator.outputs.device_udid }}" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CLANG_ANALYZER_OUTPUT=plist-html \
          CLANG_ANALYZER_OUTPUT_DIR=analyzer-results
    
    - name: Upload Analysis Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analyzer-results
        path: analyzer-results/
        retention-days: 7
